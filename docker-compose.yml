services:
  app:
    build: .
    image: bid-rag-assistant:latest
    container_name: bid-rag-assistant
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 持久化知识库文档、向量索引与用户/审计库
      - ./data/knowledge:/app/data/knowledge
      - ./data/chroma:/app/data/chroma
      - bid_db:/app/data
    restart: unless-stopped

volumes:
  bid_db:
